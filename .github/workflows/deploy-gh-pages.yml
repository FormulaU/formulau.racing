name: Sync Site Content

on:
  push:
    branches:
      - master
    paths:
      - 'img/sponsorship_logos/**'
      - 'img/media_gallery/**'
      - 'vid/**'
      - 'scripts/generate-site-content.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate site content manifest
        run: node scripts/generate-site-content.js

      - name: Commit and push manifest changes
        run: |
          if git diff --quiet -- js/site-content.js; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/site-content.js
          git commit -m "chore: update site content manifest"
          git push
